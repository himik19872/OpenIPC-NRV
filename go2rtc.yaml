# go2rtc конфигурация для NRV — RTSP/WebRTC прокси
# Запуск: go2rtc -c go2rtc.yaml
#
# Камеры регистрируются через NRV API автоматически.
# go2rtc забирает RTSP с камеры ОДИН раз и раздаёт:
#   - RTSP:   rtsp://nvr:8554/cam_{id}_main  (для VLC, Frigate, Shinobi, ...)
#   - RTSP:   rtsp://nvr:8554/cam_{id}_sub   (доп. поток)
#   - WebRTC: через API NRV                    (для браузеров)
#   - MJPEG:  /api/cameras/{id}/stream/proxy   (лёгкие клиенты)

api:
  listen: ":1984"
  origin: "*"

rtsp:
  listen: ":8554"
  default_query: "video=all"

webrtc:
  listen: ":8555"
  candidates:
    - 192.168.1.0/24
    - stun:stun.l.google.com:19302

streams:
  # Все потоки управляются динамически через NRV API
  # Формат имени: cam_{uuid}_main и cam_{uuid}_sub
  cam_7507c4dd-4a04-4862-b0da-b6913b6e858d_main:
    - rtsp://root:12345@127.0.0.1:8554/stream=0
  cam_7507c4dd-4a04-4862-b0da-b6913b6e858d_sub:
    - rtsp://root:12345@127.0.0.1:8554/stream=1
  cam_77c42261-b64a-44a0-a82b-9344b26a200a_main:
