# go2rtc конфигурация для NRV
# Запуск: go2rtc -c go2rtc.yaml

api:
  listen: ":1984"
  origin: "*"

rtsp:
  listen: ":8554"

webrtc:
  listen: ":8555"
  candidates:
    - 192.168.1.0/24
    - stun:stun.l.google.com:19302

streams:
  # Камеры добавляются через API NRV автоматически
  # Пример ручного добавления:
  # camera_entrance: rtsp://admin:pass@192.168.1.100:554/stream=0

log:
  level: info