# NRV — Docker Compose (development)
# Запуск: docker compose up -d

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: nrv-postgres
    environment:
      POSTGRES_DB: nrv_db
      POSTGRES_USER: nrv_user
      POSTGRES_PASSWORD: nrv_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nrv_user -d nrv_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: nrv-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: nrv-backend
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nrv_user:nrv_password@postgres:5432/nrv_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MEDIA_ROOT: /var/media/nrv
    volumes:
      - ./backend:/app
      - media_data:/var/media/nrv
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: nrv-worker
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nrv_user:nrv_password@postgres:5432/nrv_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MEDIA_ROOT: /var/media/nrv
    volumes:
      - ./backend:/app
      - media_data:/var/media/nrv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat (периодические задачи)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: nrv-beat
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nrv_user:nrv_password@postgres:5432/nrv_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (Nginx + React build)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: nrv-frontend
    volumes:
      - media_data:/var/media/nrv:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  media_data: